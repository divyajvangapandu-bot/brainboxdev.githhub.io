<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification=NR3Kwzij2osDAQC8y3c2sHgtHKQPgcn95P-oHVpkChk" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BrainBox</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  text-align: center;
  overflow: hidden;
}

.container {
  margin-top: 120px;
}

h1 {
  font-size: 55px;
  font-weight: bold;
}

.highlight {
  background: linear-gradient(to right, #4facfe, #a855f7);
  -webkit-background-clip: text;
  color: transparent;
}

.subtitle {
  margin-top: 10px;
  font-size: 20px;
  color: #94a3b8;
}

.author {
  margin-top: 10px;
  font-size: 14px;
  color: #64748b;
}

button {
  margin-top: 40px;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #2563eb;
}

.floating {
  position: absolute;
  bottom: 30px;
  width: 100%;
  font-size: 16px;
  color: #94a3b8;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}
</style>

</head>

<body>

<div class="container">
  <div style="font-size:80px;">🧠 ⚡</div>

  <h1>
    Welcome to <span class="highlight">BrainBox!</span>
  </h1>

  <div class="subtitle">
    Charge Your Brain. Unlock Your Game.
  </div>

  <div class="author">
    Architected by Abhinav V.
  </div>

  <a href="https://brain-charge-hub.lovable.app">
    <button>Let's Start 🚀</button>
  </a>
</div>

<div class="floating">
  Learn · Play · Grow
</div>

</body>
</html>
